<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comparador de Obra — Cañuelas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --c-bg: #0F1923;
    --c-surface: #1A2535;
    --c-border: #243044;
    --c-border2: #2E3D55;
    --c-text: #E8EDF2;
    --c-text2: #A8B4C4;
    --c-text3: #607080;
    --c-green: #4ADE80;
    --c-green-bg: rgba(74,222,128,0.10);
    --c-red: #F87171;
    --c-orange: #F5C842;
    --c-orange-bg: rgba(245,200,66,0.10);
    --c-accent: #60A5FA;
    --c-accent-bg: rgba(96,165,250,0.10);
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--c-bg); color: var(--c-text); min-height: 100vh; }

  /* Layout — full width */
  .app { max-width: 1400px; margin: 0 auto; padding: 0 0 100px; }
  .hdr { background: linear-gradient(135deg, #0F1923 0%, #1A2535 100%); border-bottom: 1px solid #243044; padding: 1.8rem 2.5rem; }
  .hdr h1 { font-size: 1.7rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .hdr p  { font-size: 1rem; color: rgba(255,255,255,0.65); margin-top: 5px; }
  .hdr-provs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .hdr-prov { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); padding: 6px 14px; border-radius: 20px; }
  .hdr-prov span { font-size: 0.95rem; color: #fff; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Tabs */
  .tabs-wrap { position: sticky; top: 0; z-index: 100; background: #0F1923; border-bottom: 1px solid var(--c-border); }
  .tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; padding: 0 1.5rem; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 16px 24px; border: none; background: transparent; font-size: 1rem; font-weight: 500; color: var(--c-text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
  .tab-btn.active { color: var(--c-green); border-bottom-color: var(--c-green); font-weight: 600; }

  /* Secciones */
  .section { margin: 16px 2.5rem 0; }
  .section-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--c-text3); padding: 10px 0 6px; }

  /* Cards */
  .card { background: var(--c-surface); border-radius: var(--radius); border: 1px solid var(--c-border); padding: 16px 18px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .card.green  { border-color: var(--c-green); background: var(--c-green-bg); }
  .card.orange { border-color: #F59E0B; background: var(--c-orange-bg); }
  .card.red    { border-color: #FCA5A5; background: rgba(160,41,28,0.04); }

  /* Compras */
  .compras-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  @media(max-width:900px){ .compras-grid { grid-template-columns: repeat(3, 1fr); } }
  @media(max-width:480px){ .compras-grid { grid-template-columns: repeat(2, 1fr); } }
  .compra-card { background: var(--c-surface); border-radius: var(--radius-sm); border: 1.5px solid var(--c-border); padding: 12px 14px; }
  .compra-card.activa { border-color: var(--accent-color, #4ADE80); }
  .compra-nombre { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .compra-monto { font-size: 1.15rem; font-weight: 700; margin-top: 4px; }
  .compra-bar-wrap { height: 4px; background: var(--c-border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
  .compra-bar { height: 100%; border-radius: 2px; }
  .compra-pct { font-size: 0.78rem; color: var(--c-text3); margin-top: 3px; }

  /* Items — card por ítem */
  .item-card { background: var(--c-surface); border-radius: var(--radius-sm); border: 1px solid var(--c-border); margin-bottom: 8px; overflow: hidden; }
  .item-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; }
  .item-nombre { font-size: 1rem; font-weight: 500; flex: 1; }
  .item-winner { font-size: 0.85rem; font-weight: 600; padding: 3px 10px; border-radius: 4px; background: var(--c-green-bg); color: var(--c-green); flex-shrink: 0; margin-left: 10px; }
  .item-body { border-top: 1px solid var(--c-border); }
  .item-prov-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 0.5px solid var(--c-border); }
  .item-prov-row:last-child { border-bottom: none; }
  .item-prov-row.winner { background: var(--c-green-bg); }
  .item-prov-name { font-size: 0.92rem; display: flex; align-items: center; gap: 7px; }
  .item-prov-right { text-align: right; }
  .item-prov-total { font-size: 1rem; font-weight: 600; }
  .item-prov-unit  { font-size: 0.82rem; color: var(--c-text3); }
  .rank-chip { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px; }
  .rank-1 { background: var(--c-green-bg); color: var(--c-green); }
  .rank-2 { background: var(--c-accent-bg); color: var(--c-accent); }
  .rank-n { background: rgba(255,255,255,0.06); color: var(--c-text3); }
  .bragado-tag { font-size: 0.75rem; background: var(--c-orange-bg); color: var(--c-orange); padding: 2px 6px; border-radius: 3px; font-weight: 600; }

  /* Categorías */
  .cat-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px 6px; cursor: pointer; }
  .cat-label { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--c-text2); }
  .cat-toggle { font-size: 0.9rem; color: var(--c-text3); }

  /* Mix óptimo */
  .prov-block { background: var(--c-surface); border-radius: var(--radius); border: 1px solid var(--c-border); margin-bottom: 12px; overflow: hidden; }
  .prov-block-hdr { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--c-border); }
  .prov-block-nombre { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .prov-block-total  { font-size: 1.1rem; font-weight: 700; }
  .mix-item-row { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 0.5px solid var(--c-border); font-size: 0.95rem; }
  .mix-item-row:last-child { border-bottom: none; }
  .mix-item-nombre { color: var(--c-text2); flex: 1; }
  .mix-item-right { text-align: right; }
  .mix-item-total { font-weight: 600; font-size: 0.95rem; }
  .mix-item-ahorro { font-size: 0.82rem; color: var(--c-green); }

  /* Total box */
  .total-box { background: var(--c-green-bg); border: 1.5px solid var(--c-green); border-radius: var(--radius); padding: 2rem; text-align: center; margin: 16px 0; }
  .total-box-label { font-size: 0.88rem; color: var(--c-green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .total-box-amount { font-size: 2.4rem; font-weight: 800; color: var(--c-green); letter-spacing: -0.03em; }
  .total-box-sub { font-size: 0.92rem; color: var(--c-text3); margin-top: 6px; }

  /* Escenarios */
  .esc-card { background: var(--c-surface); border-radius: var(--radius); border: 1px solid var(--c-border); margin-bottom: 10px; overflow: hidden; }
  .esc-card.best { border-color: var(--c-green); border-width: 2px; background: var(--c-green-bg); }
  .esc-card.base { border-color: #FCA5A5; }
  .esc-hdr { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 20px; cursor: pointer; gap: 12px; }
  .esc-label { font-size: 1.05rem; font-weight: 700; }
  .esc-sub   { font-size: 0.88rem; color: var(--c-text3); margin-top: 4px; }
  .esc-right { text-align: right; flex-shrink: 0; }
  .esc-total { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; }
  .esc-pct   { font-size: 0.92rem; font-weight: 600; color: var(--c-green); }
  .bar-wrap  { height: 8px; background: var(--c-bg); margin: 0 20px 12px; border-radius: 4px; overflow: hidden; }
  .bar       { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .esc-chips { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 20px 12px; }
  .chip { font-size: 0.85rem; padding: 4px 12px; border-radius: 4px; font-weight: 500; }
  .chip-green  { background: var(--c-green-bg);  color: var(--c-green);  }
  .chip-blue   { background: var(--c-accent-bg); color: var(--c-accent); }
  .chip-red    { background: rgba(248,113,113,0.12); color: var(--c-red); }
  .chip-orange { background: var(--c-orange-bg); color: var(--c-orange); }
  .chip-grey   { background: rgba(255,255,255,0.07); color: var(--c-text3); }
  .esc-provs   { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 20px 16px; }
  .prov-pill   { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-size: 0.88rem; font-weight: 500; }

  /* Tabla resumen escenarios */
  .resumen-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  .resumen-table th { padding: 12px 16px; text-align: right; border-bottom: 1px solid var(--c-border); font-weight: 600; color: var(--c-text3); font-size: 0.82rem; background: #131E2C; }
  .resumen-table th:first-child { text-align: left; }
  .resumen-table td { padding: 12px 16px; border-bottom: 0.5px solid var(--c-border); text-align: right; }
  .resumen-table td:first-child { text-align: left; font-weight: 500; }
  .resumen-table tr.best-row { background: var(--c-green-bg); font-weight: 700; }
  .resumen-table tr.best-row td { color: var(--c-green); }

  /* Alertas */
  .alerta { display: flex; gap: 10px; padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 10px; font-size: 0.92rem; line-height: 1.5; }
  .alerta.warn   { background: var(--c-orange-bg); border: 1px solid #F59E0B; color: var(--c-orange); }
  .alerta.info   { background: var(--c-green-bg);  border: 1px solid var(--c-green); color: var(--c-green); }
  .alerta.pend   { background: rgba(245,200,66,0.08); border: 1px solid #F59E0B; color: var(--c-orange); }
  .alerta-icon   { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }

  /* Input compra */
  .compra-input { width: 100%; padding: 5px 8px; font-size: 1rem; font-weight: 700; border: 1.5px solid; border-radius: 4px; outline: none; background: transparent; color: inherit; }

  /* Pendiente */
  .pend-tag { font-size: 0.78rem; background: rgba(245,200,66,0.12); color: var(--c-orange); padding: 2px 6px; border-radius: 3px; }
  .consultar { font-size: 0.85rem; color: var(--c-orange); font-style: italic; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useMemo } = React;
const e = React.createElement;

// ── DATOS ────────────────────────────────────────────────────────────────────

const CATEGORIAS = [
  { id:"hierros", nombre:"Hierros ✅ comprados a 7 Hnos", comprada:true, items:[
    {id:"h6", nombre:"Hierro ø6",  cant:436, comprado:true},
    {id:"h8", nombre:"Hierro ø8",  cant:59,  comprado:true},

  ]},
  { id:"viguetas", nombre:"Viguetas", items:[

    {id:"v320",nombre:"Vigueta 3,20 m",cant:1},
    {id:"v400",nombre:"Vigueta 4,00 m",cant:14},

  { id:"otros", nombre:"Otros materiales", items:[

    {id:"arena",   nombre:"Arena (m³)",         cant:52},
    {id:"piedra",  nombre:"Piedra (m³)",         cant:52},
    {id:"cemento", nombre:"Cemento LN x25kg",   cant:750},
  ]},
  { id:"varios", nombre:"Varios", items:[
    {id:"cano_cemento",  nombre:"Caño cemento 0,40×1,20",  cant:4},
    {id:"malla1525",     nombre:"Malla 15×25 2×5 5,5mm",   cant:2},
    {id:"arena_bolson",  nombre:"Arena bolsón (m³)",        cant:2},
    {id:"piedra_bolson", nombre:"Piedra bolsón (m³)",       cant:2},
    {id:"clavos250",     nombre:"Clavos 2½\" (kg)",         cant:5},
    {id:"clavos200",     nombre:"Clavos 2\" (kg)",          cant:2},
    {id:"alambre",       nombre:"Alambre fardo (kg)",       cant:5},
  ]},
];

const HIERROS_IDS = ["h6","h8","h10","h12","h16","h20"];

// Proveedores activos en comparación
const PROVEEDORES = [
  {id:"caeiro",    nombre:"Casa Caeiro",   color:"#185FA5", desc:10, nota:"–10% ef.",
   p:{h6:6450,h8:10900,h10:17250,h12:24650,h16:43300,h20:67700,v180:6300,v200:7000,v220:7700,v260:9100,v280:9800,v300:10500,v320:11100,v400:15700,v500:23900,v520:25700,ladrillo:3400,malla:50500,arena:38000,piedra:68250,cemento:7200}},
  {id:"dasilva",   nombre:"Da Silva",      color:"#B45000", desc:0,  nota:"neto",
   p:{h6:5730,h8:9350,h10:14750,h12:20700,h16:36300,h20:55930,v180:6745,v200:7490,v220:8030,v260:9490,v280:10220,v300:10950,v320:12720,v400:15900,v500:24800,v520:26100,ladrillo:5400,malla:49000,arena:35700,piedra:53300,cemento:6900,cano_cemento:38136,malla1525:61723,arena_bolson:42840,piedra_bolson:65520,clavos250:5292,clavos200:5292,alambre:5393}},
  {id:"curtoni",   nombre:"Curtoni",       color:"#0369A1", desc:0,  nota:"–10% ef.",
   p:{h6:5625,h8:9585,h10:14985,h12:21375,h16:36720,h20:57330,v200:7298,v220:8033,v260:9476,v280:10206,v300:10920,v320:11655,v400:16249,v500:25473,v520:27379,ladrillo:3400,malla:44550,cemento:6480,malla1525:40500,arena_bolson:36900,piedra_bolson:61200,clavos250:4950,clavos200:4950},
   pendientes:["v180","arena","piedra","cano_cemento","alambre"]},
  {id:"shnos",     nombre:"7 Hnos",        color:"#047857", desc:0,  nota:"ef. efectivo",
   p:{h6:5130,h8:8460,h10:13140,h12:18900,h16:32400,h20:50850,v180:6700,v200:7500,v220:8200,v260:9700,v280:10500,v300:11200,v400:16700,v500:25500,v520:27400,ladrillo:3000,malla:49000,arena:33000,piedra:54000,cemento:6800,cano_cemento:36400,malla1525:40000,arena_bolson:39000,clavos250:5500,clavos200:5500,alambre:5500},
   pendientes:["v320"]},
  {id:"esperanza", nombre:"La Esperanza",  color:"#BE185D", desc:0,  nota:"ef. 22/06",
   p:{h6:5037,h8:8583,h10:14245,h12:20390,h16:34660,h20:53000,v180:6380,v200:7779,v220:7800,v260:9200,v280:9830,v300:10600,v320:11300,v400:15405,v500:24200,v520:26000,ladrillo:2995,malla:43000,arena:35100,piedra:62553,cemento:6800,cano_cemento:34300,arena_bolson:41000,piedra_bolson:70000,clavos250:4300,clavos200:4300,alambre:4300},
   pendientes:["malla1525"]},
];

// Proveedores ocultos — referencia histórica (no participan en el mix ni comparación activa)
const PROVEEDORES_REF = [
  {id:"lhhnos",   nombre:"LH Hnos",      color:"#6B21A8", oculto:true, motivo:"No gana en ningún ítem"},
  {id:"curto",    nombre:"Curto Martins", color:"#555",    oculto:true, motivo:"Referencia de precio base"},
];

const TODOS_ITEMS = CATEGORIAS.flatMap(c=>c.items);
const ITEMS_ACTIVOS = TODOS_ITEMS.filter(i=>!i.comprado); // excluye hierros comprados
const STORAGE_KEY = "comparador_obra_github_v1";

// ── HELPERS ──────────────────────────────────────────────────────────────────
function pu(prov,id){ const r=prov.p[id]; if(!r)return null; return r*(1-prov.desc/100); }
function fmt(n){ if(!n||isNaN(n))return'—'; return "$"+Math.round(n).toLocaleString("es-AR"); }
function fmtM(n){ if(!n||isNaN(n))return'—'; return "$"+(n/1000000).toFixed(2)+"M"; }
function isPend(prov,id){ return prov.pendientes&&prov.pendientes.includes(id); }
function isBrag(pid,iid){ return pid==='shnos'&&HIERROS_IDS.includes(iid); }

function rankingItem(itemId,cant){
  // Si el ítem está comprado no participa en comparación
  const item=TODOS_ITEMS.find(i=>i.id===itemId);
  if(item?.comprado) return [];
  return PROVEEDORES.map(p=>{ const u=pu(p,itemId); return u&&u>0?{prov:p,u,total:u*cant}:null; }).filter(Boolean).sort((a,b)=>a.total-b.total);
}

function calcMix(){
  const mix={};let total=0;
  ITEMS_ACTIVOS.forEach(item=>{
    const rank=rankingItem(item.id,item.cant);
    if(!rank.length)return;
    const g=rank[0],seg=rank[1]||null;
    if(!mix[g.prov.id])mix[g.prov.id]={prov:g.prov,items:[],subtotal:0};
    mix[g.prov.id].items.push({...item,u:g.u,total:g.total,seg});
    mix[g.prov.id].subtotal+=g.total; total+=g.total;
  });
  return{mix,total};
}

function totalProv(provId){
  const prov=PROVEEDORES.find(p=>p.id===provId);
  return ITEMS_ACTIVOS.reduce((a,i)=>{ const u=pu(prov,i.id); return a+(u&&u>0?u*i.cant:0); },0);
}

function combis(arr,n){
  if(n===1)return arr.map(x=>[x]);
  const r=[];
  for(let i=0;i<arr.length-n+1;i++)
    combis(arr.slice(i+1),n-1).forEach(c=>r.push([arr[i],...c]));
  return r;
}

function calcSet(ids){
  const ps=PROVEEDORES.filter(p=>ids.includes(p.id));
  let total=0,cob=0,desglose={};
  ITEMS_ACTIVOS.forEach(item=>{
    const ops=ps.map(p=>{const u=pu(p,item.id);return u&&u>0?{prov:p,u,t:u*item.cant}:null;}).filter(Boolean).sort((a,b)=>a.t-b.t);
    if(!ops.length)return;
    total+=ops[0].t; cob++;
    const pid=ops[0].prov.id;
    if(!desglose[pid])desglose[pid]={prov:ops[0].prov,items:[],subtotal:0};
    desglose[pid].items.push({...item,u:ops[0].u,total:ops[0].t,seg:ops[1]||null});
    desglose[pid].subtotal+=ops[0].t;
  });
  return{total,cob,desglose};
}

function bestN(n){
  const ids=PROVEEDORES.map(p=>p.id);
  return combis(ids,n).map(s=>({s,...calcSet(s)})).filter(r=>r.cob===ITEMS_ACTIVOS.length).sort((a,b)=>a.total-b.total)[0];
}

// ── APP ───────────────────────────────────────────────────────────────────────
const STORAGE_PEDIDOS = "comparador_obra_pedidos_v1";

function calcMixPedido(itemsConCant){
  // itemsConCant: [{id, nombre, cant}]
  const mix={};let total=0;
  itemsConCant.forEach(item=>{
    if(!item.cant||item.cant<=0)return;
    const ops=PROVEEDORES.map(p=>{const u=pu(p,item.id);return u&&u>0?{prov:p,u,t:u*item.cant}:null;}).filter(Boolean).sort((a,b)=>a.t-b.t);
    if(!ops.length)return;
    const g=ops[0],seg=ops[1]||null;
    total+=g.t;
    const pid=g.prov.id;
    if(!mix[pid])mix[pid]={prov:g.prov,items:[],subtotal:0};
    mix[pid].items.push({...item,u:g.u,total:g.t,seg});
    mix[pid].subtotal+=g.t;
  });
  return{mix,total};
}

function App(){
  const [tab,setTab]=useState("comparacion");
  const [expandCat,setExpandCat]=useState({hierros:true,viguetas:true,otros:true,varios:false});
  const [expandItem,setExpandItem]=useState({});
  const [expandEsc,setExpandEsc]=useState({});

  // ── RENDER MIX ÓPTIMO ──────────────────────────────────────────────────────

  // Tarjeta de pedido para Mix y Ahorro
  function renderTarjetaPedido(ped){
    const itemsConCant=ITEMS_ACTIVOS.filter(i=>ped.items[i.id]>0).map(i=>({...i,cant:ped.items[i.id]}));
    if(!itemsConCant.length) return null;
    const {mix:mixPed,total:totalPed}=calcMixPedido(itemsConCant);
    if(!totalPed) return null;

    // Escenarios del pedido
    function calcSetPed(provIds){
      const ps=PROVEEDORES.filter(p=>provIds.includes(p.id));
      let total=0,cob=0;
      itemsConCant.forEach(item=>{
        const ops=ps.map(p=>{const u=pu(p,item.id);return u&&u>0?u*item.cant:null;}).filter(Boolean);
        if(ops.length){total+=Math.min(...ops);cob++;}
      });
      return{total,cob};
    }
    function bestNPed(n){
      const ids=PROVEEDORES.map(p=>p.id);
      return combis(ids,n).map(s=>({s,...calcSetPed(s)})).filter(r=>r.cob===itemsConCant.length).sort((a,b)=>a.total-b.total)[0];
    }
    const bp1=bestNPed(1), bp2=bestNPed(2), bp3=bestNPed(3);
    const basePed=bp1?.total||0;

    return e('div',{key:ped.id,style:{background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:'var(--radius)',marginBottom:12,overflow:'hidden'}},
      // Header tarjeta
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'rgba(255,255,255,0.03)',borderBottom:'1px solid var(--c-border)'}},
        e('div',{style:{display:'flex',alignItems:'center',gap:8}},
          e('span',{style:{fontSize:'1.1rem'}},'🛒'),
          e('div',null,
            e('div',{style:{fontWeight:700,fontSize:'1rem'}},ped.nombre),
            e('div',{style:{fontSize:'0.78rem',color:'var(--c-text3)',marginTop:1}},itemsConCant.length+' ítems · '+ped.creado)
          )
        ),
        e('div',{style:{textAlign:'right'}},
          e('div',{style:{fontSize:'1.2rem',fontWeight:800,color:'var(--c-green)'}},fmt(totalPed)),
          e('div',{style:{fontSize:'0.78rem',color:'var(--c-text3)',marginTop:1}},'mix óptimo')
        )
      ),
      // Bloques por proveedor
      ...Object.values(mixPed).map(({prov,items,subtotal})=>
        e('div',{key:prov.id,style:{borderLeft:'3px solid '+prov.color,margin:'8px 12px',paddingLeft:10}},
          e('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
            e('span',{style:{fontWeight:600,fontSize:'0.9rem',color:prov.color,display:'flex',alignItems:'center',gap:5}},
              e('span',{className:'dot',style:{background:prov.color}}), prov.nombre
            ),
            e('span',{style:{fontWeight:600,fontSize:'0.9rem'}},fmt(subtotal))
          ),
          ...items.map((item,ii)=>e('div',{key:item.id,style:{display:'flex',justifyContent:'space-between',fontSize:'0.82rem',padding:'3px 0',borderTop:ii>0?'0.5px solid var(--c-border)':'none'}},
            e('span',{style:{color:'var(--c-text2)'}},item.nombre+' ×'+item.cant),
            e('div',{style:{textAlign:'right'}},
              e('span',{style:{fontWeight:500}},fmt(item.total)),
              item.seg&&item.seg.t>item.total&&e('span',{style:{fontSize:'0.72rem',color:'var(--c-green)',marginLeft:6}},'–'+fmt(item.seg.t-item.total))
            )
          ))
        )
      ),
      // Tabla escenarios del pedido
      e('div',{style:{margin:'10px 12px 12px'}},
        e('div',{style:{fontSize:'0.75rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',color:'var(--c-text3)',marginBottom:6}},'Ahorro por nro. de proveedores'),
        e('table',{className:'resumen-table'},
          e('thead',null,e('tr',null,
            e('th',null,'Escenario'),e('th',null,'Total'),e('th',null,'Ahorro vs 1'),e('th',null,'Delta'),
          )),
          e('tbody',null,
            ...(()=>{
              const rows=[
                {label:'1 proveedor', val:bp1?.total, isBase:true},
                {label:'2 proveedores',val:bp2?.total},
                {label:'3 proveedores',val:bp3?.total},
                {label:'Mix óptimo',  val:totalPed, isBest:true},
              ];
              // Filtrar con regla del 2%
              const filtradas=[];
              rows.forEach((row,idx)=>{
                if(!row.val)return;
                if(idx===0||row.isBest){filtradas.push({...row,idx});return;}
                const prev=filtradas[filtradas.length-1]?.val;
                const d=prev?((prev-row.val)/prev*100):0;
                if(d>=2)filtradas.push({...row,idx});
              });
              return filtradas.map((row,fi)=>{
                const prev=fi>0?filtradas[fi-1].val:null;
                const ahorro=basePed-row.val;
                const ahorroP=((ahorro/basePed)*100);
                const deltaP=prev?((prev-row.val)/prev*100):null;
                return e('tr',{key:row.label,className:row.isBest?'best-row':'',style:{background:row.isBase?'rgba(248,113,113,0.04)':'transparent'}},
                  e('td',null,(row.isBest?'🏆 ':row.isBase?'📦 ':'')+row.label),
                  e('td',null,fmt(row.val)),
                  e('td',null,fi===0?'—':e('span',{style:{color:'var(--c-green)',fontWeight:600}},'–'+ahorroP.toFixed(1)+'%')),
                  e('td',null,deltaP===null?e('span',{style:{color:'var(--c-text3)'}},'base'):e('span',{style:{color:'var(--c-green)',fontWeight:700}},'–'+deltaP.toFixed(1)+'%'))
                );
              });
            })()
          )
        )
      )
    );
  }

  // ── RENDER ESCENARIOS ──────────────────────────────────────────────────────
  function renderEscenarios(){
    const DELTA_MIN = 2.0; // % mínimo para mostrar un escenario adicional

    // Filtrar escenarios: mostrar solo los que mejoran más del 2% vs el anterior
    const escsFiltrados = [];
    ESCENARIOS.forEach((esc,idx)=>{
      if(!esc.r) return;
      if(idx===0||esc.isBest){ escsFiltrados.push({...esc,idx}); return; } // siempre mostrar base y mix óptimo
      const prev = escsFiltrados[escsFiltrados.length-1]?.r?.total;
      const deltaP = prev ? ((prev-esc.r.total)/prev*100) : 0;
      if(deltaP >= DELTA_MIN) escsFiltrados.push({...esc,idx});
    });

    // Escenarios que se saltearon
    const saltados = ESCENARIOS.filter((esc,idx)=>{
      if(!esc.r||idx===0||esc.isBest) return false;
      return !escsFiltrados.find(e=>e.n===esc.n);
    });

    return e('div',{className:'section'},
      e('div',{style:{fontSize:'0.9rem',color:'var(--c-text2)',marginBottom:12,lineHeight:1.6}},
        'Cuánto ahorrás sumando proveedores. Solo se muestran escenarios donde la mejora supera el ',
        e('strong',{style:{color:'var(--c-orange'}},'2%'),
        ' — por debajo no justifica la logística extra.'
      ),
      // Alerta escenarios descartados
      saltados.length>0&&e('div',{className:'alerta pend',style:{marginBottom:12}},
        e('span',{className:'alerta-icon'},'ℹ️'),
        e('span',null,
          'Se omitió',saltados.length>1?' ron':' el',': ',
          saltados.map(s=>e('strong',{key:s.n},s.label)).reduce((a,b)=>[a,', ',b]),
          ' — la mejora vs el escenario anterior es menor al 2%, no justifica agregar un proveedor más.'
        )
      ),
      ...escsFiltrados.map((esc,idx)=>{
        const ahorro=base-esc.r.total;
        const ahorroP=((ahorro/base)*100);
        const prev=idx>0?escsFiltrados[idx-1].r?.total:null;
        const adicional=prev?prev-esc.r.total:0;
        const adicionalP=prev&&idx>0?((adicional/prev)*100):0;
        const barW=(esc.r.total/base*100);
        const isExp=expandEsc[esc.n];

        return e('div',{key:esc.n,className:'esc-card'+(esc.isBest?' best':idx===0?' base':'')},
          e('div',{className:'esc-hdr',onClick:()=>setExpandEsc(x=>({...x,[esc.n]:!x[esc.n]}))},
            e('div',null,
              e('div',{className:'esc-label',style:{color:esc.isBest?'var(--c-green)':idx===0?'var(--c-red)':'var(--c-text)'}},
                (esc.isBest?'🏆 ':idx===0?'📦 ':'')+esc.label
              ),
              e('div',{className:'esc-sub'},esc.r.s.map(id=>PROVEEDORES.find(p=>p.id===id).nombre).join(' · '))
            ),
            e('div',{className:'esc-right'},
              e('div',{className:'esc-total',style:{color:esc.isBest?'var(--c-green)':'inherit'}},fmtM(esc.r.total)),
              idx>0&&e('div',{className:'esc-pct'},'–'+ahorroP.toFixed(1)+'% vs 1 prov.'),
              e('span',{style:{fontSize:'0.8rem',color:'var(--c-text3)'}},isExp?'▲':'▼')
            )
          ),
          e('div',{className:'bar-wrap'},
            e('div',{className:'bar',style:{width:barW+'%',background:esc.isBest?'var(--c-green)':idx===0?'var(--c-red)':'var(--c-accent)'}})
          ),
          e('div',{className:'esc-chips'},
            idx===0&&e('span',{className:'chip chip-red'},'Costo más alto'),
            idx>0&&e('span',{className:'chip chip-green'},'Ahorrás '+fmt(ahorro)+' (–'+ahorroP.toFixed(1)+'%)'),
            idx>0&&adicionalP>=DELTA_MIN&&e('span',{className:'chip chip-blue'},'–'+adicionalP.toFixed(1)+'% vs escenario anterior · '+fmt(adicional)+' menos'),
          ),
          e('div',{className:'esc-provs'},
            ...esc.r.s.map(id=>{
              const p=PROVEEDORES.find(x=>x.id===id);
              return e('span',{key:id,className:'prov-pill',style:{background:p.color+'18',color:p.color}},
                e('span',{className:'dot',style:{background:p.color}}),p.nombre
              );
            })
          ),
          isExp&&e('div',{style:{borderTop:'1px solid var(--c-border)'}},
            ...Object.values(esc.r.desglose).map(({prov,items,subtotal})=>
              e('div',{key:prov.id,style:{borderLeft:'3px solid '+prov.color,margin:'8px 10px',paddingLeft:10}},
                e('div',{style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontWeight:700,fontSize:'0.9rem',color:prov.color}},
                  e('span',null,prov.nombre),e('span',null,fmt(subtotal))
                ),
                ...items.map((item,ii)=>e('div',{key:item.id,style:{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:'0.85rem',borderTop:ii>0?'0.5px solid var(--c-border)':'none'}},
                  e('span',{style:{color:'var(--c-text2)'}},item.nombre+' ×'+item.cant),
                  e('span',{style:{fontWeight:600}},fmt(item.total))
                ))
              )
            ),
            e('div',{style:{height:8}})
          )
        );
      }),

      // Tabla resumen — también filtrada
      e('div',{className:'section-title',style:{paddingTop:16}},'Resumen'),
      e('div',{style:{background:'var(--c-surface)',borderRadius:'var(--radius)',overflow:'hidden',border:'1px solid var(--c-border)'}},
        e('table',{className:'resumen-table'},
          e('thead',null,e('tr',null,
            e('th',null,'Escenario'),
            e('th',null,'Total'),
            e('th',null,'Ahorro vs 1 prov.'),
            e('th',null,'Delta vs anterior'),
          )),
          e('tbody',null,
            ...escsFiltrados.map((esc,idx)=>{
              const prev=idx>0?escsFiltrados[idx-1].r?.total:null;
              const deltaP=prev?((prev-esc.r.total)/prev*100):null;
              return e('tr',{key:esc.n,className:esc.isBest?'best-row':''},
                e('td',null,(esc.isBest?'🏆 ':idx===0?'📦 ':'')+esc.label),
                e('td',null,fmtM(esc.r.total)),
                e('td',null,idx===0?'—':e('span',{style:{color:'var(--c-green)',fontWeight:600}},
                  '–'+((base-esc.r.total)/base*100).toFixed(1)+'%'
                )),
                e('td',null,
                  deltaP===null
                    ? e('span',{style:{color:'var(--c-text3)'}},'base')
                    : e('div',null,
                        e('span',{style:{color:'var(--c-green)',fontWeight:700,fontSize:'1rem'}},'–'+deltaP.toFixed(1)+'%'),
                        e('div',{style:{fontSize:'0.78rem',color:'var(--c-text3)',marginTop:2}},fmt(prev-esc.r.total)+' menos')
                      )
                )
              );
            })
          )
        )
      ),
      // Tarjetas de pedidos guardados
      pedidos.some(p=>Object.values(p.items).some(v=>v>0))&&e('div',null,
        e('div',{style:{fontSize:'0.85rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',color:'var(--c-text3)',padding:'16px 0 8px',borderTop:'1px solid var(--c-border)',marginTop:16}},'Ahorro por pedido guardado'),
        ...pedidos.filter(p=>Object.values(p.items).some(v=>v>0)).map(renderTarjetaPedido)
      )
    );
  }

  // ── RENDER CARRITO ─────────────────────────────────────────────────────────
  function renderCarrito(){
    const pedidoSel = pedidos.find(p=>p.id===pedidoActivo);

    return e('div',{className:'section'},

      // Barra superior — lista de pedidos + nuevo
      e('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:16}},
        ...pedidos.map(p=>e('button',{key:p.id,
          onClick:()=>setPedidoActivo(p.id),
          style:{padding:'7px 16px',border:'1.5px solid '+(p.id===pedidoActivo?'var(--c-green)':'var(--c-border)'),borderRadius:20,background:p.id===pedidoActivo?'var(--c-green-bg)':'transparent',color:p.id===pedidoActivo?'var(--c-green)':'var(--c-text2)',fontWeight:p.id===pedidoActivo?700:400,cursor:'pointer',fontSize:'0.9rem',display:'flex',alignItems:'center',gap:6}},
          p.nombre,
          e('span',{style:{fontSize:'0.75rem',color:'var(--c-text3)',marginLeft:2}},
            Object.values(p.items).filter(v=>v>0).length+' ítems'
          )
        )),
        mostrarFormPedido
          ? e('div',{style:{display:'flex',gap:6,alignItems:'center'}},
              e('input',{autoFocus:true,value:nuevoPedidoNombre,onChange:ev=>setNuevoPedidoNombre(ev.target.value),
                placeholder:'Nombre del pedido...',
                onKeyDown:ev=>{if(ev.key==='Enter')crearPedido();if(ev.key==='Escape')setMostrarFormPedido(false);},
                style:{padding:'7px 12px',border:'1.5px solid var(--c-green)',borderRadius:8,background:'var(--c-surface)',color:'var(--c-text)',fontSize:'0.9rem',outline:'none',width:200}}),
              e('button',{onClick:crearPedido,style:{padding:'7px 14px',background:'var(--c-green)',color:'#000',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer',fontSize:'0.9rem'}},'Crear'),
              e('button',{onClick:()=>setMostrarFormPedido(false),style:{padding:'7px 10px',background:'transparent',color:'var(--c-text3)',border:'1px solid var(--c-border)',borderRadius:8,cursor:'pointer',fontSize:'0.9rem'}},'✕')
            )
          : e('button',{onClick:()=>setMostrarFormPedido(true),
              style:{padding:'7px 16px',border:'1.5px dashed var(--c-border)',borderRadius:20,background:'transparent',color:'var(--c-text3)',cursor:'pointer',fontSize:'0.9rem'}},
              '+ Nuevo pedido'
            )
      ),

      // Estado vacío
      !pedidoSel&&e('div',{style:{textAlign:'center',padding:'3rem',color:'var(--c-text3)'}},
        e('div',{style:{fontSize:'2rem',marginBottom:8}},'🛒'),
        e('div',{style:{fontSize:'1rem',marginBottom:4}},'No hay pedidos todavía'),
        e('div',{style:{fontSize:'0.88rem'}},'Creá un pedido nuevo para empezar'),
      ),

      // Pedido seleccionado
      pedidoSel&&e('div',null,

        // Header del pedido
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
          e('div',null,
            e('div',{style:{fontSize:'1.1rem',fontWeight:700}},pedidoSel.nombre),
            e('div',{style:{fontSize:'0.82rem',color:'var(--c-text3)',marginTop:2}},'Creado: '+pedidoSel.creado),
          ),
          e('div',{style:{display:'flex',gap:8}},
            e('button',{onClick:()=>limpiarPedido(pedidoSel.id),style:{padding:'6px 12px',border:'1px solid var(--c-border)',borderRadius:6,background:'transparent',color:'var(--c-text3)',cursor:'pointer',fontSize:'0.82rem'}},'Limpiar'),
            e('button',{onClick:()=>eliminarPedido(pedidoSel.id),style:{padding:'6px 12px',border:'1px solid #F87171',borderRadius:6,background:'rgba(248,113,113,0.08)',color:'#F87171',cursor:'pointer',fontSize:'0.82rem'}},'Eliminar')
          )
        ),

        // Lista de ítems agrupados por categoría
        ...CATEGORIAS.map(cat=>e('div',{key:cat.id,style:{marginBottom:12}},
          e('div',{style:{fontSize:'0.78rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--c-text3)',padding:'6px 0 4px',borderBottom:'1px solid var(--c-border)',marginBottom:4}},
            cat.nombre
          ),
          ...cat.items.filter(i=>!i.comprado).map(item=>{
            const cantActual=pedidoSel.items[item.id]||0;
            // mejor precio para esta cant
            const mejorU=cantActual>0?PROVEEDORES.map(p=>{const u=pu(p,item.id);return u&&u>0?u:null;}).filter(Boolean).reduce((a,b)=>Math.min(a,b),Infinity):0;
            const mejorTotal=cantActual>0&&mejorU<Infinity?mejorU*cantActual:0;
            return e('div',{key:item.id,style:{display:'flex',alignItems:'center',gap:8,padding:'8px 4px',borderBottom:'0.5px solid var(--c-border)'}},
              // Nombre
              e('div',{style:{flex:1,fontSize:'0.9rem'}},item.nombre),
              // Botón "cant. obra"
              e('button',{
                onClick:()=>usarCantObra(pedidoSel.id,item.id,item.cant),
                title:'Usar cantidad total de obra ('+item.cant+')',
                style:{padding:'4px 8px',background:'var(--c-accent-bg)',color:'var(--c-accent)',border:'none',borderRadius:4,cursor:'pointer',fontSize:'0.75rem',flexShrink:0}},
                '×'+item.cant
              ),
              // Input cantidad
              e('input',{
                type:'number',min:0,
                value:cantActual||'',
                placeholder:'0',
                onChange:ev=>actualizarCantItem(pedidoSel.id,item.id,ev.target.value),
                style:{width:80,padding:'5px 8px',border:'1.5px solid '+(cantActual>0?'var(--c-green)':'var(--c-border)'),borderRadius:6,background:'var(--c-surface)',color:'var(--c-text)',fontSize:'0.9rem',textAlign:'right',outline:'none'}}),
              // Total al mejor precio
              e('div',{style:{width:110,textAlign:'right',fontSize:'0.88rem',fontWeight:cantActual>0?600:400,color:cantActual>0?'var(--c-green)':'var(--c-text3)'}},
                cantActual>0&&mejorTotal>0?fmt(mejorTotal):'—'
              )
            );
          })
        )),

        // Resumen y mix del pedido
        (()=>{
          const itemsConCant=ITEMS_ACTIVOS.filter(i=>pedidoSel.items[i.id]>0).map(i=>({...i,cant:pedidoSel.items[i.id]}));
          if(!itemsConCant.length) return e('div',{style:{textAlign:'center',padding:'1.5rem',color:'var(--c-text3)',fontSize:'0.9rem'}},'Cargá cantidades para ver el mix óptimo');
          const {mix:mixPed,total:totalPed}=calcMixPedido(itemsConCant);

          return e('div',{style:{marginTop:16}},
            e('div',{style:{fontSize:'0.85rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',color:'var(--c-text3)',marginBottom:8}},'Mix óptimo para este pedido'),

            ...Object.values(mixPed).map(({prov,items,subtotal})=>
              e('div',{key:prov.id,style:{background:'var(--c-surface)',borderRadius:'10px',border:'1px solid var(--c-border)',marginBottom:8,overflow:'hidden',borderLeft:'3px solid '+prov.color}},
                e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid var(--c-border)'}},
                  e('span',{style:{fontWeight:700,color:prov.color,fontSize:'0.95rem',display:'flex',alignItems:'center',gap:6}},
                    e('span',{className:'dot',style:{background:prov.color}}),prov.nombre
                  ),
                  e('span',{style:{fontWeight:700,fontSize:'0.95rem'}},fmt(subtotal))
                ),
                ...items.map((item,idx)=>{
                  const ahorro=item.seg?item.seg.t-item.total:null;
                  return e('div',{key:item.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',borderBottom:idx<items.length-1?'0.5px solid var(--c-border)':'none',background:idx%2===0?'transparent':'rgba(255,255,255,0.02)'}},
                    e('span',{style:{fontSize:'0.88rem',color:'var(--c-text2)'}},item.nombre+' ×'+item.cant),
                    e('div',{style:{textAlign:'right'}},
                      e('div',{style:{fontSize:'0.88rem',fontWeight:600}},fmt(item.total)),
                      ahorro&&ahorro>0&&e('div',{style:{fontSize:'0.75rem',color:'var(--c-green)'}},'ahorra '+fmt(ahorro)+' vs '+item.seg.prov.nombre)
                    )
                  );
                })
              )
            ),

            e('div',{style:{background:'var(--c-green-bg)',border:'1.5px solid var(--c-green)',borderRadius:10,padding:'1.2rem',textAlign:'center',marginTop:8}},
              e('div',{style:{fontSize:'0.8rem',color:'var(--c-green)',fontWeight:600,marginBottom:4}},'TOTAL PEDIDO — MIX ÓPTIMO'),
              e('div',{style:{fontSize:'2rem',fontWeight:800,color:'var(--c-green)',letterSpacing:'-0.03em'}},fmt(totalPed))
            )
          );
        })()
      ),

      // Comparación entre todos los pedidos
      pedidos.length>1&&e('div',{style:{marginTop:24}},
        e('div',{style:{fontSize:'0.85rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',color:'var(--c-text3)',marginBottom:8}},'Comparación entre pedidos'),
        e('div',{style:{background:'var(--c-surface)',borderRadius:10,overflow:'hidden',border:'1px solid var(--c-border)'}},
          e('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'0.9rem'}},
            e('thead',null,e('tr',null,
              e('th',{style:{textAlign:'left',padding:'10px 14px',borderBottom:'1px solid var(--c-border)',color:'var(--c-text3)',fontSize:'0.8rem',fontWeight:600,background:'#131E2C'}},'Pedido'),
              e('th',{style:{textAlign:'right',padding:'10px 14px',borderBottom:'1px solid var(--c-border)',color:'var(--c-text3)',fontSize:'0.8rem',fontWeight:600,background:'#131E2C'}},'Ítems'),
              e('th',{style:{textAlign:'right',padding:'10px 14px',borderBottom:'1px solid var(--c-border)',color:'var(--c-text3)',fontSize:'0.8rem',fontWeight:600,background:'#131E2C'}},'Total mix óptimo'),
              e('th',{style:{textAlign:'right',padding:'10px 14px',borderBottom:'1px solid var(--c-border)',color:'var(--c-text3)',fontSize:'0.8rem',fontWeight:600,background:'#131E2C'}},'Proveedores'),
            )),
            e('tbody',null,
              ...pedidos.map((ped,idx)=>{
                const itemsConCant=ITEMS_ACTIVOS.filter(i=>ped.items[i.id]>0).map(i=>({...i,cant:ped.items[i.id]}));
                const {mix:mp,total:tp}=calcMixPedido(itemsConCant);
                const provs=Object.values(mp).map(x=>x.prov);
                return e('tr',{key:ped.id,style:{background:ped.id===pedidoActivo?'var(--c-green-bg)':idx%2===0?'transparent':'rgba(255,255,255,0.02)',cursor:'pointer'},onClick:()=>setPedidoActivo(ped.id)},
                  e('td',{style:{padding:'10px 14px',fontWeight:ped.id===pedidoActivo?700:400,color:ped.id===pedidoActivo?'var(--c-green)':'var(--c-text)',borderBottom:'0.5px solid var(--c-border)'}},
                    (ped.id===pedidoActivo?'▶ ':'')+ped.nombre
                  ),
                  e('td',{style:{padding:'10px 14px',textAlign:'right',color:'var(--c-text3)',borderBottom:'0.5px solid var(--c-border)'}},itemsConCant.length),
                  e('td',{style:{padding:'10px 14px',textAlign:'right',fontWeight:600,color:tp>0?'var(--c-green)':'var(--c-text3)',borderBottom:'0.5px solid var(--c-border)'}},tp>0?fmt(tp):'—'),
                  e('td',{style:{padding:'10px 14px',textAlign:'right',borderBottom:'0.5px solid var(--c-border)'}},
                    e('div',{style:{display:'flex',justifyContent:'flex-end',gap:4,flexWrap:'wrap'}},
                      ...provs.map(p=>e('span',{key:p.id,style:{fontSize:'0.72rem',padding:'2px 6px',borderRadius:3,background:p.color+'18',color:p.color}},p.nombre))
                    )
                  )
                );
              })
            )
          )
        )
      )
    );
  }

  // ── TABS ───────────────────────────────────────────────────────────────────
  const TABS=[
    {id:'comparacion',label:'📊 Precios'},
    {id:'mix',        label:'🏆 Mix óptimo'},
    {id:'escenarios', label:'💰 Ahorro'},
    {id:'carrito',    label:'🛒 Pedidos'+(pedidos.length>0?' ('+pedidos.length+')':'')},
  ];

  return e('div',{className:'app'},
    // Header
    e('div',{className:'hdr'},
      e('h1',null,'🏗 Comparador de Obra'),
      e('p',null,'Cañuelas, Buenos Aires · 5 proveedores activos · actualizado 22/06/2026'),
      e('div',{className:'hdr-provs'},
        ...PROVEEDORES.map(p=>e('div',{key:p.id,className:'hdr-prov'},
          e('span',{className:'dot',style:{background:p.color}}),
          e('span',null,p.nombre)
        )),
        ...PROVEEDORES_REF.map(p=>e('div',{key:p.id,className:'hdr-prov',style:{opacity:0.35,border:'1px dashed rgba(255,255,255,0.2)'}},
          e('span',{className:'dot',style:{background:p.color}}),
          e('span',{style:{textDecoration:'line-through'}},p.nombre)
        ))
      )
    ),

    // Compras (siempre visible)
    renderCompras(),

    // Tabs
    e('div',{className:'tabs-wrap'},
      e('div',{className:'tabs'},
        ...TABS.map(t=>e('button',{key:t.id,className:'tab-btn'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},t.label))
      )
    ),

    tab==='comparacion'&&renderComparacion(),
    tab==='mix'&&renderMix(),
    tab==='escenarios'&&renderEscenarios(),
    tab==='carrito'&&renderCarrito(),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
