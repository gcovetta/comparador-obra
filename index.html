<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comparador de Obra — Cañuelas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>

    --c-bg: #0F1923;
    --c-surface: #1A2535;
    --c-border: #243044;
    --c-border2: #2E3D55;
    --c-text: #E8EDF2;
    --c-text2: #A8B4C4;
    --c-text3: #607080;
    --c-green: #4ADE80;
    --c-green-bg: rgba(74,222,128,0.10);
    --c-red: #F87171;
    --c-orange: #F5C842;
    --c-orange-bg: rgba(245,200,66,0.10);
    --c-accent: #60A5FA;
    --c-accent-bg: rgba(96,165,250,0.10);
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--c-bg); color: var(--c-text); min-height: 100vh; }

  /* Layout */
  .app { max-width: 1500px; margin: 0 auto; padding: 0 0 100px; }

  /* Grillas de escritorio: en pantallas anchas los ítems van lado a lado */
  @media (min-width: 900px) {
    .app { padding-left: 16px; padding-right: 16px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 8px; align-items: start; }
    .cards-grid .item-card { margin-bottom: 0; }
    .cards-grid-lg { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 10px; align-items: start; }
    .cards-grid-lg .prov-block, .cards-grid-lg .esc-card { margin-bottom: 0; }
  }
  .hdr { background: linear-gradient(135deg, #0F1923 0%, #1A2535 100%); border-bottom: 1px solid #243044; padding: 1.2rem 1rem; }
  .hdr h1 { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .hdr p  { font-size: 0.72rem; color: rgba(255,255,255,0.65); margin-top: 3px; }
  .hdr-provs { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .hdr-prov { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.12); padding: 3px 8px; border-radius: 20px; border: none; cursor: pointer; font-family: inherit; }
  .hdr-prov span { font-size: 0.7rem; color: #fff; }
  .hdr-prov.off { background: rgba(255,255,255,0.05); }
  .hdr-prov.off span { color: rgba(255,255,255,0.4); text-decoration: line-through; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Tabs */
  .tabs-wrap { position: sticky; top: 0; z-index: 100; background: #0F1923; border-bottom: 1px solid var(--c-border); }
  .tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 12px 14px; border: none; background: transparent; font-size: 0.78rem; font-weight: 500; color: var(--c-text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
  .tab-btn.active { color: var(--c-green); border-bottom-color: var(--c-green); font-weight: 600; }

  /* Secciones */
  .section { margin: 12px 10px 0; }
  .section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--c-text3); padding: 8px 0 4px; }

  /* Cards */
  .card { background: var(--c-surface); border-radius: var(--radius); border: 1px solid var(--c-border); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
  .card.green  { border-color: var(--c-green); background: var(--c-green-bg); }
  .card.orange { border-color: #F59E0B; background: var(--c-orange-bg); }
  .card.red    { border-color: #FCA5A5; background: rgba(160,41,28,0.04); }

  /* Compras */
  .compras-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  @media(max-width:480px){ .compras-grid { grid-template-columns: repeat(2, 1fr); } }
  .compra-card { background: var(--c-surface); border-radius: var(--radius-sm); border: 1.5px solid var(--c-border); padding: 8px 10px; }
  .compra-card.activa { border-color: var(--accent-color, #1B6B45); }
  .compra-nombre { font-size: 0.72rem; font-weight: 600; }
  .compra-monto { font-size: 1rem; font-weight: 700; margin-top: 2px; }
  .compra-bar-wrap { height: 3px; background: var(--c-border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .compra-bar { height: 100%; border-radius: 2px; }
  .compra-pct { font-size: 0.65rem; color: var(--c-text3); margin-top: 2px; }

  /* Items móvil — card por ítem */
  .item-card { background: var(--c-surface); border-radius: var(--radius-sm); border: 1px solid var(--c-border); margin-bottom: 6px; overflow: hidden; }
  .item-header { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; cursor: pointer; }
  .item-nombre { font-size: 0.82rem; font-weight: 500; flex: 1; }
  .item-winner { font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--c-green-bg); color: var(--c-green); flex-shrink: 0; margin-left: 8px; }
  .item-body { border-top: 1px solid var(--c-border); }
  .item-prov-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 12px; border-bottom: 0.5px solid var(--c-border); }
  .item-prov-row:last-child { border-bottom: none; }
  .item-prov-row.winner { background: var(--c-green-bg); }
  .item-prov-name { font-size: 0.75rem; display: flex; align-items: center; gap: 5px; }
  .item-prov-right { text-align: right; }
  .item-prov-total { font-size: 0.82rem; font-weight: 600; }
  .item-prov-unit  { font-size: 0.68rem; color: var(--c-text3); }
  .rank-chip { font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; }
  .rank-1 { background: var(--c-green-bg); color: var(--c-green); }
  .rank-2 { background: var(--c-accent-bg); color: var(--c-accent); }
  .rank-n { background: rgba(0,0,0,0.06); color: var(--c-text3); }

  /* Subtotal categoría */
  .cat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px 4px; cursor: pointer; }
  .cat-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--c-text2); }
  .cat-toggle { font-size: 0.7rem; color: var(--c-text3); }
  .cat-toggle-btn { font-size: 0.62rem; font-weight: 600; background: transparent; border: 1px solid var(--c-border2); color: var(--c-text3); border-radius: 4px; padding: 3px 8px; cursor: pointer; font-family: inherit; }

  /* Mix óptimo */
  .prov-block { background: var(--c-surface); border-radius: var(--radius); border: 1px solid var(--c-border); margin-bottom: 10px; overflow: hidden; }
  .prov-block-hdr { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--c-border); }
  .prov-block-nombre { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 7px; }
  .prov-block-total  { font-size: 0.9rem; font-weight: 700; }
  .mix-item-row { display: flex; justify-content: space-between; padding: 7px 14px; border-bottom: 0.5px solid var(--c-border); font-size: 0.8rem; }
  .mix-item-row:last-child { border-bottom: none; }
  .mix-item-nombre { color: var(--c-text2); flex: 1; }
  .mix-item-right { text-align: right; }
  .mix-item-total { font-weight: 600; }
  .mix-item-ahorro { font-size: 0.68rem; color: var(--c-green); }

  /* Total box */
  .total-box { background: var(--c-green-bg); border: 1.5px solid var(--c-green); border-radius: var(--radius); padding: 1.2rem; text-align: center; margin: 12px 0; }
  .total-box-label { font-size: 0.72rem; color: var(--c-green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .total-box-amount { font-size: 1.8rem; font-weight: 800; color: var(--c-green); letter-spacing: -0.03em; }
  .total-box-sub { font-size: 0.75rem; color: var(--c-text3); margin-top: 4px; }

  /* Escenarios */
  .esc-card { background: var(--c-surface); border-radius: var(--radius); border: 1px solid var(--c-border); margin-bottom: 8px; overflow: hidden; }
  .esc-card.best { border-color: var(--c-green); border-width: 2px; background: var(--c-green-bg); }
  .esc-card.base { border-color: #FCA5A5; }
  .esc-hdr { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 14px; cursor: pointer; gap: 8px; }
  .esc-label { font-size: 0.88rem; font-weight: 700; }
  .esc-sub   { font-size: 0.7rem; color: var(--c-text3); margin-top: 2px; }
  .esc-right { text-align: right; flex-shrink: 0; }
  .esc-total { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
  .esc-pct   { font-size: 0.75rem; font-weight: 600; color: var(--c-green); }
  .bar-wrap  { height: 6px; background: var(--c-bg); margin: 0 14px 10px; border-radius: 3px; overflow: hidden; }
  .bar       { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .esc-chips { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 14px 10px; }
  .chip { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
  .chip-green  { background: var(--c-green-bg);  color: var(--c-green);  }
  .chip-blue   { background: var(--c-accent-bg); color: var(--c-accent); }
  .chip-red    { background: rgba(160,41,28,0.08); color: var(--c-red); }
  .chip-orange { background: var(--c-orange-bg); color: var(--c-orange); }
  .chip-grey   { background: rgba(0,0,0,0.05); color: var(--c-text3); }
  .esc-provs   { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 14px 12px; }
  .prov-pill   { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 500; }

  /* Escenarios tabla resumen */
  .resumen-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .resumen-table th { padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--c-border); font-weight: 600; color: var(--c-text3); font-size: 0.7rem; background: #131E2C; }
  .resumen-table th:first-child { text-align: left; }
  .resumen-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--c-border); text-align: right; }
  .resumen-table td:first-child { text-align: left; font-weight: 500; }
  .resumen-table tr.best-row { background: var(--c-green-bg); font-weight: 700; }
  .resumen-table tr.best-row td { color: var(--c-green); }

  /* Alertas */
  .alerta { display: flex; gap: 8px; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 8px; font-size: 0.75rem; }
  .alerta.warn   { background: var(--c-orange-bg); border: 1px solid #F59E0B; color: #92400E; }
  .alerta.info   { background: var(--c-green-bg);  border: 1px solid var(--c-green); color: var(--c-green); }
  .alerta.pend   { background: #FFF9C4; border: 1px solid #F59E0B; color: #92400E; }
  .alerta-icon   { flex-shrink: 0; font-size: 0.9rem; }

  /* Input compra */
  .compra-input { width: 100%; padding: 4px 6px; font-size: 0.85rem; font-weight: 700; border: 1.5px solid; border-radius: 4px; outline: none; background: transparent; }
  .compra-add-btn { margin-top: 5px; width: 100%; padding: 3px 0; font-size: 0.65rem; font-weight: 600; background: transparent; border: 1px dashed; border-radius: 4px; cursor: pointer; }

  /* Pendiente tag */
  .pend-tag { font-size: 0.62rem; background: #FFF9C4; color: #92400E; padding: 1px 5px; border-radius: 3px; }
  .consultar { font-size: 0.7rem; color: #92400E; font-style: italic; }

  /* Faltantes */
  .stepper { display: inline-flex; align-items: center; gap: 3px; }
  .stepper button { width: 27px; height: 27px; border-radius: 6px; border: 1px solid var(--c-border2); background: var(--c-bg); color: var(--c-text2); font-size: 1rem; line-height: 1; cursor: pointer; flex-shrink: 0; }
  .stepper button:active { background: var(--c-border); }
  .stepper input { width: 54px; text-align: center; background: transparent; border: 1px solid var(--c-border); border-radius: 6px; color: var(--c-text); font-size: 0.85rem; font-weight: 700; padding: 4px 2px; outline: none; }
  .falt-label { font-size: 0.6rem; color: var(--c-text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
</style>
</head>

const HIERROS_IDS = ["h6","h8","h10","h12","h16","h20"];

const PROVEEDORES = [

   p:{h6:6450,h8:10900,h10:17250,h12:24650,h16:43300,h20:67700,v180:6300,v200:7000,v220:7700,v260:9100,v280:9800,v300:10500,v320:11100,v400:15700,v500:23900,v520:25700,ladrillo:3400,malla:50500,arena:38000,piedra:68250,cemento:7650}},
  {id:"dasilva",   nombre:"Da Silva",      color:"#B45000", desc:0,  nota:"neto",
   p:{h6:5730,h8:9350,h10:14750,h12:20700,h16:36300,h20:55930,v180:6745,v200:7490,v220:8030,v260:9490,v280:10220,v300:10950,v320:12720,v400:15900,v500:24800,v520:26100,ladrillo:5400,malla:49000,arena:35700,piedra:53300,cemento:7216,cano_cemento:38136,malla1525:61723,arena_bolson:44880,piedra_bolson:68640,clavos250:5292,clavos200:5292,alambre:5852}},
  {id:"lhhnos",    nombre:"LH Hnos",      color:"#6B21A8", desc:0,  nota:"–10% ef.",
   p:{h6:6660,h12:23670,h16:41400,arena:45000,piedra:56790,cemento:7470,malla:54000,cano_cemento:37800,malla1525:54000,arena_bolson:41400,piedra_bolson:62100,clavos250:5040,clavos200:5040,alambre:4770},
   pendientes:["h8","h10","h20","v180","v200","v220","v260","v280","v300","v320","v400","v500","v520","ladrillo"]},
  {id:"curtoni",   nombre:"Curtoni",      color:"#0369A1", desc:0,  nota:"–10% ef.",
   p:{h6:5625,h8:9585,h10:14985,h12:21375,h16:36720,h20:57330,v200:7298,v220:8033,v260:9476,v280:10206,v300:10920,v320:11655,v400:16249,v500:25473,v520:27379,ladrillo:3400,malla:44550,cemento:6480,malla1525:40500,arena_bolson:36900,piedra_bolson:61200,clavos250:4950,clavos200:4950},
   pendientes:["v180","arena","piedra","cano_cemento","alambre"]},
  {id:"shnos",     nombre:"7 Hnos",       color:"#047857", desc:0,  nota:"ef. 08/07",
   p:{h6:5130,h8:8460,h10:13140,h12:18900,h16:32400,h20:50850,v180:6700,v200:7500,v220:8200,v260:9700,v280:10500,v300:11200,v400:16700,v500:25500,v520:27400,ladrillo:3300,malla:49000,arena:34000,piedra:54000,cemento:6800,cano_cemento:36400,malla1525:44500,arena_bolson:41000,clavos250:5500,clavos200:5500,alambre:5500},

   p:{h6:5037,h8:8583,h10:14245,h12:20390,h16:34660,h20:53000,v180:6380,v200:7779,v220:7800,v260:9200,v280:9830,v300:10600,v320:11300,v400:15405,v500:24200,v520:26000,ladrillo:3127,malla:45087,arena:35100,piedra:62553,cemento:7132,cano_cemento:36577,arena_bolson:45094,piedra_bolson:74727,clavos250:4300,clavos200:4300,alambre:4864},
   pendientes:["malla1525"]},
];

const TODOS_ITEMS = CATEGORIAS.flatMap(c=>c.items);
const STORAGE_KEY = "comparador_obra_github_v1";
const APP_VERSION = "v23";
const STORAGE_ACTIVOS = "comparador_obra_activos_v1";
const ACTIVOS_DEFAULT = {caeiro:true,dasilva:true,lhhnos:true,curtoni:false,shnos:true,esperanza:true};
const STORAGE_ITEMS = "comparador_obra_items_v2";
const COMPRADOS_IDS = ["cano_cemento","malla1525","arena_bolson","piedra_bolson","alambre","clavos250","clavos200"];
const ITEMS_DEFAULT = {};
TODOS_ITEMS.forEach(i=>{ ITEMS_DEFAULT[i.id] = !HIERROS_IDS.includes(i.id) && !COMPRADOS_IDS.includes(i.id); });
const STORAGE_CANT = "comparador_obra_cantidades_v2";
const STORAGE_CARRITO = "comparador_obra_carrito_v1";
const CANT_DEFAULT = {};
TODOS_ITEMS.forEach(i=>{
  let comp=0;
  if(HIERROS_IDS.includes(i.id))comp=i.cant;         // hierros ya comprados (7 Hnos)
  else if(i.id==='cemento')comp=95;                   // 80 La Esperanza 03/07 + 15 previas
  else if(COMPRADOS_IDS.includes(i.id))comp=i.cant;   // varios ya comprados (caño, mallas 15×25, bolsones, clavos, alambre)
  CANT_DEFAULT[i.id]={nec:i.cant,comp};
});

// ── HELPERS ──────────────────────────────────────────────────────────────────
function pu(prov,id){ const r=prov.p[id]; if(!r)return null; return r*(1-prov.desc/100); }
function fmt(n){ if(!n||isNaN(n))return'—'; return "$"+Math.round(n).toLocaleString("es-AR"); }
function fmtM(n){ if(!n||isNaN(n))return'—'; return "$"+(n/1000000).toFixed(2)+"M"; }
function isPend(prov,id){ return prov.pendientes&&prov.pendientes.includes(id); }

function rankingItem(itemId,cant,provs){
  return (provs||PROVEEDORES).map(p=>{ const u=pu(p,itemId); return u&&u>0?{prov:p,u,total:u*cant}:null; }).filter(Boolean).sort((a,b)=>a.total-b.total);
}

function calcMix(provs,items){
  const mix={};let total=0;
  (items||TODOS_ITEMS).forEach(item=>{
    const rank=rankingItem(item.id,item.cant,provs);
    if(!rank.length)return;
    const g=rank[0],seg=rank[1]||null;
    if(!mix[g.prov.id])mix[g.prov.id]={prov:g.prov,items:[],subtotal:0};
    mix[g.prov.id].items.push({...item,u:g.u,total:g.total,seg});
    mix[g.prov.id].subtotal+=g.total; total+=g.total;
  });
  return{mix,total};
}

function totalProv(provId){
  const prov=PROVEEDORES.find(p=>p.id===provId);
  return TODOS_ITEMS.reduce((a,i)=>{ const u=pu(prov,i.id); return a+(u&&u>0?u*i.cant:0); },0);
}

function bestUno(provs,items){
  const lista=items||TODOS_ITEMS;
  let best=null;
  provs.forEach(p=>{
    let total=0,desglose={},fuera=0,cob=0;
    lista.forEach(item=>{
      let u=pu(p,item.id),prov=p;
      if(!u||u<=0){
        const alt=provs.filter(q=>q.id!==p.id)
          .map(q=>{const v=pu(q,item.id);return v&&v>0?{prov:q,u:v}:null;})
          .filter(Boolean).sort((a,b)=>a.u-b.u)[0];
        if(!alt)return;
        u=alt.u; prov=alt.prov; fuera++;
      }
      const t=u*item.cant; total+=t; cob++;
      if(!desglose[prov.id])desglose[prov.id]={prov:prov,items:[],subtotal:0};
      desglose[prov.id].items.push({...item,u:u,total:t,seg:null});
      desglose[prov.id].subtotal+=t;
    });
    if(cob===0)return;
    const r={s:Object.keys(desglose),total,desglose,cob,mainId:p.id,fuera};
    if(!best||total<best.total)best=r;
  });
  return best;
}

function combis(arr,n){
  if(n===1)return arr.map(x=>[x]);
  const r=[];
  for(let i=0;i<arr.length-n+1;i++)
    combis(arr.slice(i+1),n-1).forEach(c=>r.push([arr[i],...c]));
  return r;
}

function calcSet(ids,items){
  const ps=PROVEEDORES.filter(p=>ids.includes(p.id));
  let total=0,cob=0,desglose={};
  const lista=items||TODOS_ITEMS;
  lista.forEach(item=>{
    const ops=ps.map(p=>{const u=pu(p,item.id);return u&&u>0?{prov:p,u,t:u*item.cant}:null;}).filter(Boolean).sort((a,b)=>a.t-b.t);
    if(!ops.length)return;
    total+=ops[0].t; cob++;
    const pid=ops[0].prov.id;
    if(!desglose[pid])desglose[pid]={prov:ops[0].prov,items:[],subtotal:0};
    desglose[pid].items.push({...item,u:ops[0].u,total:ops[0].t,seg:ops[1]||null});
    desglose[pid].subtotal+=ops[0].t;
  });
  return{total,cob,desglose};
}

function bestN(n,ids,items){
  ids=ids||PROVEEDORES.map(p=>p.id);
  const lista=items||TODOS_ITEMS;
  if(ids.length<n||!lista.length)return null;
  return combis(ids,n).map(s=>({s,...calcSet(s,lista)})).filter(r=>r.cob===lista.length).sort((a,b)=>a.total-b.total)[0];
}

          // Desglose expandido
          isExp&&e('div',{style:{borderTop:'1px solid var(--c-border)'}},
            ...Object.values(esc.r.desglose).map(({prov,items,subtotal})=>
              e('div',{key:prov.id,style:{borderLeft:'3px solid '+prov.color,margin:'8px 10px',paddingLeft:10}},
                e('div',{style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontWeight:700,fontSize:'0.82rem',color:prov.color}},
                  e('span',null,prov.nombre),e('span',null,fmt(subtotal))
                ),
                ...items.map((item,ii)=>e('div',{key:item.id,style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:'0.75rem',borderTop:ii>0?'0.5px solid var(--c-border)':'none'}},
                  e('span',{style:{color:'var(--c-text2)'}},item.nombre+' ×'+item.cant),
                  e('span',{style:{fontWeight:600}},fmt(item.total))
                ))
              )
            ),
            e('div',{style:{height:8}})
          )
        );
      }))
    );
  }

  // ── RENDER FALTANTES ───────────────────────────────────────────────────────
  function Stepper(k,val,color,onSet){
    return e('div',{className:'stepper'},
      e('button',{onClick:()=>onSet(val-1)},'−'),
      e('input',{key:k+'_'+val,defaultValue:val,inputMode:'numeric',
        onBlur:ev=>onSet(ev.target.value),
        onKeyDown:ev=>{if(ev.key==='Enter')ev.target.blur();},
        style:color?{color:color,borderColor:color+'66'}:null}),
      e('button',{onClick:()=>onSet(val+1)},'+')
    );
  }

  function renderFaltantes(){
    let granTotal=0, sinCotizar=[];
    const bloques=CATEGORIAS.map(cat=>{
      const rows=cat.items.map(item=>{
        const c=cants[item.id]||{nec:item.cant,comp:0};
        const falt=Math.max(0,c.nec-c.comp);
        const rank=rankingItem(item.id,1,provsActivos);
        const best=rank[0]||null;
        const total=best&&falt>0?falt*best.u:0;
        if(falt>0&&!best)sinCotizar.push(item.nombre);
        granTotal+=total;
        return {item,c,falt,best,total};
      });
      const sub=rows.reduce((a,r)=>a+r.total,0);
      return {cat,rows,sub};
    });

    return e('div',{className:'section'},
      e('div',{className:'alerta info'},
        e('span',{className:'alerta-icon'},'🧮'),
        e('span',null,'Ajustá "Necesito" y "Compré" con +/− o tocando el número. El costo usa el mejor precio unitario vigente de los proveedores activos.')
      ),
      ...bloques.map(({cat,rows,sub})=>
        e('div',{key:cat.id},
          e('div',{className:'cat-header',style:{cursor:'default'}},
            e('span',{className:'cat-label'},cat.nombre),
            e('span',{style:{fontSize:'0.78rem',fontWeight:700,color:sub>0?'var(--c-text)':'var(--c-text3)'}},sub>0?fmt(sub):'✓ completo')
          ),
          e('div',{className:'cards-grid'},
            ...rows.map(({item,c,falt,best,total})=>{
            const abierto=!!expandFalt[item.id];
            return e('div',{key:item.id,className:'item-card',style:{padding:'10px 12px',opacity:falt===0?0.5:1}},
              e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8,cursor:'pointer'},
                 onClick:()=>setExpandFalt(x=>({...x,[item.id]:!x[item.id]}))},
                e('span',{className:'item-nombre'},item.nombre),
                e('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
                  falt===0
                    ? e('span',{style:{fontSize:'0.7rem',fontWeight:600,color:'var(--c-green)'}},'✓ Completo')
                    : best
                      ? e('div',{style:{textAlign:'right'}},
                          e('div',{style:{fontSize:'0.9rem',fontWeight:700,color:best.prov.color}},fmt(total)),
                          e('div',{style:{fontSize:'0.65rem',color:'var(--c-text3)'}},falt+' × '+fmt(best.u)+' · '+best.prov.nombre)
                        )
                      : e('span',{className:'consultar'},'sin cotizar'),
                  e('span',{style:{fontSize:'0.65rem',color:'var(--c-text3)'}},abierto?'▲':'▼')
                )
              ),
              abierto&&e('div',{style:{display:'flex',alignItems:'center',gap:12,marginTop:8,flexWrap:'wrap'}},
                e('div',null,
                  e('div',{className:'falt-label'},'Necesito'),
                  Stepper(item.id+'_nec',c.nec,null,v=>setCant(item.id,'nec',v))
                ),
                e('div',null,
                  e('div',{className:'falt-label'},'Compré'),
                  Stepper(item.id+'_comp',c.comp,best?best.prov.color:null,v=>setCant(item.id,'comp',v))
                ),
                e('div',{style:{marginLeft:'auto',textAlign:'right'}},
                  e('div',{className:'falt-label'},'Faltan'),
                  e('div',{style:{fontSize:'1rem',fontWeight:800,color:falt>0?'var(--c-text)':'var(--c-green)'}},falt)
                )
              )
            );
          })
          )
        )
      ),
      e('div',{className:'total-box'},
        e('div',{className:'total-box-label'},'Costo de lo que falta comprar'),
        e('div',{className:'total-box-amount'},fmt(granTotal)),
        e('div',{className:'total-box-sub'},'Cada faltante al mejor precio unitario vigente'+(sinCotizar.length?' · Sin cotizar: '+sinCotizar.join(', '):''))
      )
    );
  }


  // ── RENDER CARRITO ─────────────────────────────────────────────────────────
  function renderCarrito(){
    const cartItems=TODOS_ITEMS.filter(i=>carrito[i.id]>0).map(i=>({...i,cant:carrito[i.id]}));
    const hay=cartItems.length>0;
    let mixC={},totalC=0,escRows=[];
    if(hay){
      const r=calcMix(provsActivos,cartItems); mixC=r.mix; totalC=r.total;
      const nProvMix=Object.keys(mixC).length;
      const nombre=id=>PROVEEDORES.find(p=>p.id===id).nombre;
      const u1=bestUno(provsActivos,cartItems);
      const d2=bestN(2,idsActivos,cartItems);
      const t3=bestN(3,idsActivos,cartItems);
      escRows=[
        {label:'🏆 Mix óptimo ('+nProvMix+' prov.)',val:totalC},
        t3?{label:'Mejor trío: '+t3.s.map(nombre).join(' + '),val:t3.total}:null,
        d2?{label:'Mejor dupla: '+d2.s.map(nombre).join(' + '),val:d2.total}:null,
        u1?{label:'Todo a uno: '+nombre(u1.mainId)+(u1.fuera>0?' (+'+u1.fuera+' ítem'+(u1.fuera>1?'s':'')+' que no cotiza, en otro)':''),val:u1.total}:null,
      ].filter(Boolean).sort((a,b)=>a.val-b.val);
    }
    return e('div',{className:'section'},
      e('div',{className:'alerta info'},
        e('span',{className:'alerta-icon'},'🛒'),
        e('span',null,'Tildá los ítems de tu próxima compra y ajustá cantidades: abajo te digo dónde conviene comprarla.')
      ),
      e('div',{style:{display:'flex',gap:8,marginBottom:6}},
        e('button',{className:'cat-toggle-btn',onClick:cargarFaltantes},'⚡ Cargar todos los faltantes'),
        hay&&e('button',{className:'cat-toggle-btn',onClick:vaciarCarrito},'🗑 Vaciar carrito')
      ),
      ...CATEGORIAS.map(cat=>
        e('div',{key:cat.id},
          e('div',{className:'cat-header',style:{cursor:'default'}},
            e('span',{className:'cat-label'},cat.nombre),
            e('span',{style:{fontSize:'0.65rem',color:'var(--c-text3)'}},cat.items.filter(i=>carrito[i.id]>0).length+' en el carrito')
          ),
          e('div',{className:'cards-grid'},
            ...cat.items.map(item=>{
              const enCarro=carrito[item.id]>0;
              const rank=rankingItem(item.id,1,provsActivos);
              const best=rank[0]||null;
              return e('div',{key:item.id,className:'item-card',style:{padding:'9px 12px',opacity:enCarro?1:0.7}},
                e('div',{style:{display:'flex',alignItems:'center',gap:9,cursor:'pointer'},onClick:()=>toggleCarrito(item.id)},
                  e('input',{type:'checkbox',checked:enCarro,onClick:ev=>ev.stopPropagation(),onChange:()=>toggleCarrito(item.id),
                    style:{width:16,height:16,accentColor:'#4ADE80',flexShrink:0,cursor:'pointer'}}),
                  e('span',{className:'item-nombre'},item.nombre),
                  enCarro&&best&&e('span',{style:{marginLeft:'auto',fontSize:'0.82rem',fontWeight:700,color:best.prov.color}},fmt(best.u*carrito[item.id]))
                ),
                enCarro&&e('div',{style:{display:'flex',alignItems:'center',gap:12,marginTop:7,flexWrap:'wrap'}},
                  e('div',null,
                    e('div',{className:'falt-label'},'Cantidad'),
                    Stepper('car_'+item.id,carrito[item.id],best?best.prov.color:null,v=>setCarritoQty(item.id,v))
                  ),
                  best&&e('div',{style:{marginLeft:'auto',textAlign:'right'}},
                    e('div',{className:'falt-label'},'Mejor precio'),
                    e('div',{style:{fontSize:'0.75rem',fontWeight:600,color:best.prov.color}},best.prov.nombre+' · '+fmt(best.u)+'/u')
                  )
                )
              );
            })
          )
        )
      ),
      hay&&e('div',null,
        e('div',{className:'section-title',style:{paddingTop:14}},'🏆 Dónde comprar este pedido'),
        e('div',{className:'cards-grid-lg'},
          ...Object.values(mixC).map(({prov,items,subtotal})=>
            e('div',{key:prov.id,className:'prov-block'},
              e('div',{className:'prov-block-hdr'},
                e('div',{className:'prov-block-nombre'},
                  e('span',{className:'dot',style:{background:prov.color}}),
                  e('span',{style:{color:prov.color}},prov.nombre)
                ),
                e('div',{className:'prov-block-total',style:{color:prov.color}},fmt(subtotal))
              ),
              ...items.map(it=>{
                const ah=it.seg?(it.seg.total-it.total):0;
                return e('div',{key:it.id,className:'mix-item-row'},
                  e('div',{className:'mix-item-nombre'},
                    it.nombre,
                    e('span',{style:{fontSize:'0.68rem',color:'var(--c-text3)',marginLeft:4}},'×'+it.cant)
                  ),
                  e('div',{className:'mix-item-right'},
                    e('div',{className:'mix-item-total'},fmt(it.total)),
                    e('div',{style:{fontSize:'0.65rem',color:'var(--c-text3)'}},fmt(it.u)+'/u'),
                    ah>0&&e('div',{className:'mix-item-ahorro'},'ahorra '+fmt(ah)+' vs '+it.seg.prov.nombre)
                  )
                );
              })
            )
          )
        ),
        e('div',{style:{background:'var(--c-surface)',borderRadius:'var(--radius)',overflow:'hidden',border:'1px solid var(--c-border)',marginTop:10}},
          e('table',{className:'resumen-table'},
            e('thead',null,e('tr',null,
              e('th',null,'Escenario'),e('th',null,'Total'),e('th',null,'vs mejor'),
            )),
            e('tbody',null,
              ...escRows.map((row,idx)=>
                e('tr',{key:idx,className:idx===0?'best-row':''},
                  e('td',null,row.label),
                  e('td',null,fmt(row.val)),
                  e('td',null,idx===0?'—':e('span',{style:{color:'var(--c-red)',fontWeight:600}},
                    '+'+(((row.val-escRows[0].val)/escRows[0].val)*100).toFixed(1)+'%'
                  ))
                )
              )
            )
          )
        ),
        e('div',{className:'total-box',style:{marginTop:10}},
          e('div',{className:'total-box-label'},'Total del carrito (mix óptimo)'),
          e('div',{className:'total-box-amount'},fmt(totalC)),
          e('div',{className:'total-box-sub'},cartItems.length+' ítems · cada uno al mejor precio vigente entre proveedores activos')
        )
      )
    );
  }

  const TABS=[
    {id:'faltantes',  label:'🧮 Faltantes'},
    {id:'carrito',    label:'🛒 Carrito'},
    {id:'comparacion',label:'📊 Precios'},
    {id:'mix',        label:'🏆 Mix óptimo'},
    {id:'escenarios', label:'💰 Ahorro'},
  ];

  return e('div',{className:'app'},
    // Header
    e('div',{className:'hdr'},
      e('h1',null,'🏗 Comparador de Obra'),
      e('p',null,'Cañuelas, Buenos Aires · '+nAct+' de '+PROVEEDORES.length+' proveedores activos · precios jul/26 (⚠️ LH al 22/06) · '+APP_VERSION),
      e('div',{className:'hdr-provs'},
        ...PROVEEDORES.map(p=>{
          const off=activos[p.id]===false;
          return e('button',{key:p.id,className:'hdr-prov'+(off?' off':''),onClick:()=>toggleProv(p.id),title:off?'Tocá para incluir':'Tocá para excluir'},
            e('span',{className:'dot',style:{background:off?'var(--c-text3)':p.color}}),
            e('span',null,p.nombre),
            off&&e('span',{style:{fontSize:'0.65rem',opacity:0.8}},'✕')
          );
        })
      ),
      e('p',{style:{fontSize:'0.65rem',color:'rgba(255,255,255,0.5)',marginTop:6}},
        'Tocá un proveedor para incluirlo o excluirlo de las comparaciones'
      )
    ),

    // Compras (siempre visible)
    renderCompras(),

    // Tabs
    e('div',{className:'tabs-wrap'},
      e('div',{className:'tabs'},
        ...TABS.map(t=>e('button',{key:t.id,className:'tab-btn'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},t.label))
      )
    ),

    tab==='faltantes'&&renderFaltantes(),
    tab==='carrito'&&renderCarrito(),
    tab==='comparacion'&&renderComparacion(),
    tab==='mix'&&renderMix(),
    tab==='escenarios'&&renderEscenarios(),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
